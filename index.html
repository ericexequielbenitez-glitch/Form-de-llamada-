<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solicitud de Llamado - Personal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1fa2d6, #2bc0e4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  width: 430px;
  padding: 35px;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;
}

.logo img {
  width: 160px;
  margin-bottom: 20px;
}

h2 {
  margin-bottom: 20px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background-color: #0099cc;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background-color: #007aa3;
}

.message-container {
  display: none;
  margin-top: 20px;
}

.message-container img {
  width: 70px;
  margin-bottom: 15px;
}

.message-text {
  font-size: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="logo.png" alt="Personal Logo">
  </div>

  <h2>Solicitud de Llamado</h2>

  <form id="formulario">

    <input type="text" name="dni" placeholder="DNI del titular" required>
    <input type="text" name="nombre" placeholder="Nombre completo" required>
    <input type="tel" name="telefono" placeholder="Teléfono de contacto" required>
    <input type="text" name="motivo" placeholder="Motivo del llamado" required>

    <label>Fecha a llamar</label>
    <input type="date" name="fecha_llamar" required>

    <label>Horario preferido</label>
    <select name="horario_llamar" required>
      <option value="">Seleccionar horario</option>
      <option value="Lo antes posible">Lo antes posible</option>
      <option value="A la mañana">A la mañana</option>
      <option value="A la tarde">A la tarde</option>
      <option value="A la noche">A la noche</option>
    </select>

    <button type="submit">Solicitar llamado</button>

  </form>

  <div class="message-container" id="success"></div>
  <div class="message-container" id="error"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxO8MJWDBxdcxS9oGLTegD8cjDy3YmpXXSV7NQ0S5zHd9czLuNutO1t52tPpat3fb1HHQ/exec";

const form = document.getElementById("formulario");
const success = document.getElementById("success");
const errorBox = document.getElementById("error");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  // 🔥 Resetear todo SIEMPRE
  success.style.display = "none";
  errorBox.style.display = "none";
  success.innerHTML = "";
  errorBox.innerHTML = "";

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(response => response.text())
  .then(result => {

    form.style.display = "none";

    if (result === "YA_EXISTE") {

      errorBox.innerHTML = `
        <img src="x-roja.png">
        <div class="message-text">
          Ya registraste una solicitud en las últimas 24 horas.
        </div>
      `;

      errorBox.style.display = "block";

    } else {

      success.innerHTML = `
        <img src="tilde-verificacion.png">
        <div class="message-text">
          Número de caso<br>
          <b style="font-size:20px;">${result}</b>
        </div>
      `;

      success.style.display = "block";
    }

  })
  .catch(error => {
      alert("Error al enviar el formulario.");
      console.error(error);
  });

});
</script>

</body>
</html>
